font_family JetBrains Mono
cursor_shape block
shell_integration no-cursor
scrollback_lines -1
scrollback_pager_history_size 2048

macos_option_as_alt yes
macos_show_window_title_in window

# Kitty watches xdg-desktop-portal's `org.freedesktop.appearance/color-scheme`
# and auto-includes `light-theme.auto.conf` / `dark-theme.auto.conf` /
# `no-preference-theme.auto.conf` based on its current value. The explicit
# include below is the fallback when the portal reports "no preference".
# noctalia's `darkModeChange` hook writes the freedesktop color-scheme key so
# the running portal flips and kitty reloads in place.
include no-preference-theme.auto.conf
include ${KITTY_OS}.conf
globinclude conf.d/**/*.conf
include local.conf

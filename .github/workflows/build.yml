name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: namespace-profile-default
          - system: aarch64-linux
            runner: namespace-profile-default-arm64
          - system: aarch64-darwin
            runner: namespace-profile-darwin-aarch64
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            accept-flake-config = true
            extra-substituters = "https://cache.kclj.io/kclejeune" "https://install.determinate.systems" "https://noctalia.cachix.org"
            extra-trusted-public-keys = "kclejeune:u0sa4anVXC4bKlzEsijdSlLyWVaEkApu6KWyDbbJMkk=" "cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM=" "noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4="

      # Disabled while nimbus is the push target — re-enable to dual-publish.
      # - name: Set up Cachix
      #   uses: cachix/cachix-action@v17
      #   with:
      #     name: kclejeune
      #     authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Install nimbus
        run: nix profile install --accept-flake-config .#nimbus

      - name: Log in to nimbus
        run: nimbus login default ${{ vars.NIMBUS_ENDPOINT }} ${{ secrets.NIMBUS_AUTH_TOKEN }}

      - name: Run flake checks
        run: |
          nix flake check \
            --system ${{ matrix.system }} \
            --print-build-logs \
            --show-trace \
            --accept-flake-config \
            -j auto

      # The checks were just built by flake check, so their outPaths are valid
      # in the store; evaluating them is enough for one batched push.
      - name: Push build outputs to nimbus
        run: |
          nix eval .#checks.${{ matrix.system }} \
            --apply 'checks: map (c: c.outPath) (builtins.attrValues checks)' \
            --json --accept-flake-config \
            | jq -r '.[]' \
            | nimbus push kclejeune --stdin

creation_rules:
  # Shared user secrets (e.g. kclejeune's password hash) consumed by every
  # personal-identity NixOS host via profile-personal — encrypted to all of
  # them so each can decrypt with its own SSH host key.
  - path_regex: secrets/users\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *gateway
          - *haven
          - *forge
          - *vault
          - *atlas
          - *wally
          - *phil
  - path_regex: secrets/gateway\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *gateway
  - path_regex: secrets/haven\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *haven
  - path_regex: secrets/forge\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *forge
  - path_regex: secrets/vault\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *vault
  - path_regex: secrets/atlas\.yaml$
    key_groups:
      - age:
          - *kclejeune
          - *atlas
